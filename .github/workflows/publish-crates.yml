name: Publish to crates.io

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish ${{ matrix.package }} to crates.io
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - omnimcode-core
          - omnimcode-ffi
          - omnimcode-python
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Publish ${{ matrix.package }}
        run: cargo publish -p ${{ matrix.package }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - name: Wait for publish to propagate
        run: sleep 30

  verify-published:
    name: Verify crates published
    runs-on: ubuntu-latest
    needs: publish
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Test install from crates.io
        run: |
          cargo search omnimcode-core --limit 3
          cargo search omnimcode-ffi --limit 3
          cargo search omnimcode-python --limit 3
